<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Class Connect - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h1 id="titleRegister">Registro</h1>

    <div class="flags">
        <img src="img/es.png" onclick="registroES()" alt="Español">
        <img src="img/en.png" onclick="registroEN()" alt="English">
    </div>

    <form>
        <label id="userReg">Usuario</label>
        <input type="text" placeholder="Nombre de usuario" required>

        <label id="emailReg">Correo electrónico</label>
        <input type="email" placeholder="correo@email.com" required>

        <label id="passReg">Contraseña</label>
        <input type="password" placeholder="Contraseña" required>

        <button type="submit" id="btnReg">Registrarse</button>
    </form>

    <p class="register-text">
        <span id="haveAccount">¿Ya tienes cuenta?</span>
        <a href="index.html" id="loginLink">Iniciar sesión</a>
    </p>
</div>

<script src="script.js"></script>
</body>
</html>
