<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EduApp</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg,#e8ebf2 0%,#d9dde7 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      overflow:hidden;
      position:relative;
    }

    /* EFECTOS DE FONDO */

    body::before{
      content:'';
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(39,136,255,0.12);
      border-radius:50%;
      top:-180px;
      left:-180px;
      filter:blur(40px);
    }

    body::after{
      content:'';
      position:absolute;
      width:450px;
      height:450px;
      background:rgba(30,203,123,0.10);
      border-radius:50%;
      bottom:-180px;
      right:-180px;
      filter:blur(40px);
    }

    .container{
      width:100%;
      max-width:1200px;
      position:relative;
      z-index:2;
      animation:fadeIn 0.7s ease;
    }

    .header{
      text-align:center;
      margin-bottom:45px;
    }

    .title{
      font-size:52px;
      font-weight:700;
      color:#1d3557;
      margin-bottom:10px;
    }

    .subtitle{
      color:#5c677d;
      font-size:17px;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:28px;
    }

    .menu-card{
      height:170px;
      border-radius:30px;
      background:linear-gradient(135deg,#3b82f6 0%,#2563eb 40%,#10b981 100%);
      text-decoration:none;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      overflow:hidden;
      transition:0.35s ease;
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.18);
      box-shadow:0 14px 30px rgba(39,136,255,0.22);
    }

    .menu-card:hover{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 20px 40px rgba(39,136,255,0.30);
    }

    .menu-card::before{
      content:'';
      position:absolute;
      width:180px;
      height:180px;
      background:rgba(255,255,255,0.08);
      border-radius:50%;
      top:-60px;
      right:-60px;
    }

    .icon{
      width:72px;
      height:72px;
      border-radius:22px;
      background:rgba(255,255,255,0.15);
      display:flex;
      justify-content:center;
      align-items:center;
      backdrop-filter:blur(10px);
      font-size:38px;
      margin-bottom:14px;
      z-index:1;
    }

    .menu-title{
      font-size:24px;
      font-weight:700;
      z-index:1;
    }

    .menu-desc{
      font-size:14px;
      opacity:0.9;
      margin-top:8px;
      z-index:1;
    }

    .coming-soon{
      position:absolute;
      top:18px;
      right:18px;
      background:rgba(255,255,255,0.2);
      padding:6px 12px;
      border-radius:50px;
      font-size:11px;
      font-weight:700;
      backdrop-filter:blur(10px);
      z-index:2;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      .title{
        font-size:38px;
      }

      .menu-grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1 class="title">Class Conect</h1>
      <p class="subtitle">Panel principal del estudiante</p>
    </div>

    <div class="menu-grid">

      <a href="faltas.html" class="menu-card">
        <div class="icon">📋</div>
        <div class="menu-title">Faltas</div>
        <div class="menu-desc">Control de asistencia</div>
      </a>

      <a href="notas.html" class="menu-card">
        <div class="icon">📚</div>
        <div class="menu-title">Notas</div>
        <div class="menu-desc">Boletín académico</div>
      </a>

      <a href="clase.html" class="menu-card">
        <div class="icon">🏫</div>
        <div class="menu-title">Clase</div>
        <div class="menu-desc">Asignaturas y tareas</div>
      </a>

      <a href="#" class="menu-card">
        <div class="coming-soon">Próximamente</div>
        <div class="icon">🏆</div>
        <div class="menu-title">Clasificación</div>
        <div class="menu-desc">Ranking de alumnos</div>
      </a>

      <a href="#" class="menu-card">
        <div class="coming-soon">Próximamente</div>
        <div class="icon">🎁</div>
        <div class="menu-title">Premios</div>
        <div class="menu-desc">Objetos desbloqueables</div>
      </a>

      <a href="#" class="menu-card">
        <div class="coming-soon">Próximamente</div>
        <div class="icon">🕒</div>
        <div class="menu-title">Horario</div>
        <div class="menu-desc">Horario de clases</div>
      </a>

    </div>

  </div>

</body>
</html>
